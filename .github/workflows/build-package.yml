name: Build and publish go-sn package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Install Zig 0.13.0
        run: |
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          echo "${PWD}/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Build
        run: zig build -Dbuild_type=zig

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-sn
          ARCH=arm64
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" "${BUILD}/usr/bin" "${DIST}"

          # --- Binary -------------------------------------------------------------
          install -Dm755 zig-out/bin/go-sn "${BUILD}/usr/bin/go-sn"

          # --- DEBIAN/control -----------------------------------------------------
          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Section: utils
          Priority: optional
          Homepage: https://gocontroll.com
          Description: Utility for writing and reading serial numbers of Moduline controllers
           Reads and writes the controller serial number to an area of eMMC memory
           that is not mapped by the filesystem, so it persists through reflashes.
          CONTROL

          # --- Build --------------------------------------------------------------
          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-sn_${{ steps.version.outputs.version }}_arm64.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-sn",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "arm64",
              "deb_url": "https://github.com/GOcontroll/go-sn/releases/download/${{ github.ref_name }}/go-sn_${{ steps.version.outputs.version }}_arm64.deb"
            }
